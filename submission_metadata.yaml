# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  "The proposed solution is an offline AI-powered candidate discovery and ranking system that combines 
  deterministic filtering, semantic matching, and behavioral scoring. Candidates first pass through a 
  three-level filtering pipeline that validates mandatory business rules, detects honeypot conditions, 
  verifies claimed skills using assessment scores, enforces product-company and required skill 
  constraints, and computes a behavioral multiplier from Redrob signals (response rate, activity, 
  experience, GitHub activity, location, career stability, offer acceptance, and title alignment). 
  Near-duplicate profiles are removed using MinHash and MinHashLSH before semantic processing. 
  SentenceTransformer (all-MiniLM-L6-v2) generates embeddings for both the job description and 
  candidate profiles, followed by cosine similarity computation. The final ranking score is calculated 
  by combining semantic similarity with the behavioral multiplier. The pipeline is optimized for 
  CPU-only execution using adaptive parallel processing, chunk-based candidate processing, dynamic 
  PyTorch thread allocation, and automatic batch-size optimization, enabling efficient processing of 
  large candidate datasets and generation of the Top-100 ranked candidates."

